<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tông Môn Dashboard - Manual Refresh</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #02040a; --card: rgba(13, 17, 23, 0.9); --header: #161b22;
            --text-main: #f0f6fc; --text-sub: #8b949e; --border: rgba(48, 54, 61, 0.8);
            --accent: #00d2ff; --accent-glow: rgba(0, 210, 255, 0.2);
            --success: #00ff88; --danger: #ff4b5c; --warning: #ffcc00; --shadow: rgba(0, 0, 0, 0.8);
        }
        [data-theme="light"] {
            --bg: #f8fafc; --card: #ffffff; --header: #f1f5f9;
            --text-main: #1e293b; --text-sub: #64748b; --border: #e2e8f0;
            --accent: #4f46e5; --accent-glow: rgba(79, 70, 229, 0.05);
            --success: #059669; --danger: #e11d48; --warning: #d97706;
        }

        * { box-sizing: border-box; transition: background 0.3s, border 0.3s; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, var(--accent-glow) 0%, transparent 50%);
            color: var(--text-main); margin: 0; padding: 20px 10px; min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; position: relative; }

        /* Theme Toggle */
        .theme-toggle {
            position: absolute; top: 0; right: 0; width: 42px; height: 42px; border-radius: 12px;
            background: var(--card); border: 1px solid var(--border); cursor: pointer;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px var(--shadow); z-index: 100;
        }

        header { text-align: center; margin-bottom: 30px; }
        h1 {
            font-size: 2.2rem; font-weight: 800; margin: 0; letter-spacing: -1.5px;
            background: linear-gradient(180deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--accent-glow));
        }
        #update-info { color: var(--text-sub); font-size: 0.85rem; margin-top: 8px; }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 25px; }
        @media (min-width: 768px) { .stats-grid { grid-template-columns: repeat(6, 1fr); } }

        .stat-card {
            background: var(--card); padding: 15px 10px; border-radius: 18px;
            border: 1px solid var(--border); text-align: center; box-shadow: 0 4px 15px var(--shadow);
        }
        .stat-card .label { font-size: 0.65rem; color: var(--text-sub); text-transform: uppercase; font-weight: 700; margin-bottom: 5px; display: block; }
        .stat-card .val { font-size: 1.2rem; font-weight: 800; color: #fff; }
        [data-theme="light"] .stat-card .val { color: var(--text-main); }

        .search-box { margin-bottom: 20px; }
        .search-box input {
            width: 100%; background: var(--card); border: 1px solid var(--border);
            padding: 12px 20px; border-radius: 14px; color: var(--text-main); font-size: 0.9rem; outline: none;
        }

        /* Table Mobile Support */
        .table-wrapper {
            background: var(--card); border-radius: 20px; border: 1px solid var(--border);
            overflow-x: auto; -webkit-overflow-scrolling: touch; box-shadow: 0 10px 30px var(--shadow);
        }
        table { width: 100%; border-collapse: collapse; min-width: 850px; }
        th {
            background: var(--header); padding: 15px 10px; color: var(--text-sub);
            font-size: 0.7rem; font-weight: 800; text-transform: uppercase; cursor: pointer; border-bottom: 1px solid var(--border);
        }
        td { padding: 12px 8px; border-bottom: 1px solid rgba(48, 54, 61, 0.3); text-align: center; font-size: 0.85rem; }
        tr:hover { background: rgba(56, 189, 248, 0.03); }

        /* Column Widths */
        .col-id { width: 70px; opacity: 0.4; font-family: monospace; }
        .col-img { width: 60px; }
        .col-name { width: 180px; text-align: left !important; font-weight: 700; color: #fff; }
        [data-theme="light"] .col-name { color: var(--text-main); }
        .col-role { width: 130px; }
        .col-gold { width: 110px; font-weight: 700; }
        .col-online { width: 180px; color: var(--text-sub); font-size: 0.8rem; }
        .col-tmc { width: 90px; font-weight: 800; font-size: 1.05rem; }

        .avatar { width: 36px; height: 36px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border); vertical-align: middle; }
        .badge { font-size: 0.65rem; padding: 4px 8px; border-radius: 8px; font-weight: 800; display: inline-block; min-width: 90px; }
        .badge-1 { background: rgba(255, 75, 92, 0.15); color: #ff4b5c; border: 1px solid rgba(255, 75, 92, 0.3); }
        .badge-2 { background: rgba(255, 204, 0, 0.15); color: #ffcc00; border: 1px solid rgba(255, 204, 0, 0.3); }
        .badge-3 { background: rgba(168, 85, 247, 0.15); color: #a855f7; border: 1px solid rgba(168, 85, 247, 0.3); }
        .badge-4 { background: rgba(139, 148, 158, 0.1); color: var(--text-sub); border: 1px solid var(--border); }

        .green { color: var(--success); } .red { color: var(--danger); opacity: 0.8; }
        th.sorted-asc::after { content: " ▴"; color: var(--accent); }
        th.sorted-desc::after { content: " ▾"; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">🌙</span></button>
    <header>
        <h1 id="guild-name">TÔNG MÔN</h1>
        <div id="update-info">Dữ liệu cố định - Tải lại trang để cập nhật</div>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><span class="label">Đệ Tử</span><span id="total-members" class="val">0</span></div>
        <div class="stat-card"><span class="label">Góp Vàng</span><span id="donated-count" class="val" style="color:var(--success)">0</span></div>
        <div class="stat-card"><span class="label">Quỹ Vàng</span><span id="total-gold" class="val">0</span></div>
        <div class="stat-card"><span class="label">Tiến Độ</span><span id="percent" class="val" style="color:var(--accent)">0%</span></div>
        <div class="stat-card"><span class="label">Boss Cuối</span><span id="boss-last-date" class="val" style="font-size:0.85rem; color:var(--warning)">--</span></div>
        <div class="stat-card"><span class="label">Diệt Boss</span><span id="boss-hit-count" class="val">0</span></div>
    </div>

    <div class="search-box">
        <input type="text" id="search-box" placeholder="Tìm tên đệ tử, chức vụ..." onkeyup="filterData()">
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th class="col-id" data-sort="id">ID</th>
                    <th class="col-img">ẢNH</th>
                    <th class="col-name" data-sort="name">TÊN</th>
                    <th class="col-role" data-sort="role">CHỨC VỤ</th>
                    <th class="col-gold" data-sort="gold">VÀNG</th>
                    <th class="col-online" data-sort="online">ONLINE</th>
                    <th class="col-tmc" data-sort="point">TMC</th>
                </tr>
            </thead>
            <tbody id="guild-table"></tbody>
        </table>
    </div>
    <p style="text-align: center; color: var(--text-sub); font-size: 0.7rem; margin-top: 15px;">← Vuốt sang ngang để xem đầy đủ cột trên mobile →</p>
</div>

<script>
const DOMAIN = "https://cmangax14.com", guild_id = 22;
const roleMap = {1:"Tông chủ", 2:"Phó Tông chủ", 3:"Trưởng lão", 4:"Thành viên"};
let currentSort = {column:"point", asc:false};

function toggleTheme() {
    const html = document.documentElement;
    const target = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
    html.setAttribute("data-theme", target);
    document.getElementById("theme-icon").innerText = target === "light" ? "☀️" : "🌙";
    localStorage.setItem("tm_theme_manual", target);
}
const savedTheme = localStorage.getItem("tm_theme_manual") || "dark";
document.documentElement.setAttribute("data-theme", savedTheme);
document.getElementById("theme-icon").innerText = savedTheme === "light" ? "☀️" : "🌙";

const safeParse = v => { try { return typeof v==="string" ? JSON.parse(v) : v||{}; } catch { return {}; }};
const parseNum = v => {
    if(v==null) return null;
    const n = Number(String(v).trim().replace(/[^\d.-]/g,""));
    return Number.isFinite(n) ? n : null;
};

function getTMCColor(p) {
    if (p >= 300) return "var(--danger)"; if (p >= 200) return "var(--warning)";
    if (p >= 80) return "var(--success)"; return "var(--accent)";
}

async function loadData() {
    try {
        const [gRes, mRes, sRes] = await Promise.all([
            fetch(`${DOMAIN}/api/get_data_by_id?table=game_guild&data=data,donate&id=${guild_id}`).then(r => r.json()),
            fetch(`${DOMAIN}/api/game_guild_member?waiting=0&guild=${guild_id}`).then(r => r.json()),
            fetch(`${DOMAIN}/api/score_list?type=guild_battle_player&limit=500`).then(r => r.json())
        ]);

        const guild = safeParse(gRes.data.data), donateMap = safeParse(gRes.data.donate);
        const members = mRes.data || mRes, scoreMap = {};
        (sRes.data || sRes).forEach(s => {
            const i = s.info ? safeParse(s.info) : {};
            if(i.id) scoreMap[i.id] = Number(s.score) || 0;
        });

        document.getElementById("guild-name").innerText = (guild.name || "TÔNG MÔN").toUpperCase();
        document.getElementById("update-info").innerText = `Cập nhật lúc: ${new Date().toLocaleTimeString('vi-VN')}`;
        document.getElementById("boss-last-date").innerText = guild.boss?.day || "N/A";
        document.getElementById("boss-hit-count").innerText = (guild.boss?.amount || 0).toLocaleString();

        const tbody = document.getElementById("guild-table"); tbody.innerHTML = "";
        let donated = 0, totalG = 0;

        members.forEach(m => {
            const info = safeParse(m.info), gold = Number(donateMap[String(m.id_game_character)]) || 0;
            if(gold > 0) { donated++; totalG += gold; }
            const point = scoreMap[m.id_game_character] || 0;
            
            const tr = document.createElement("tr");
            tr.dataset.id = m.id_game_character; tr.dataset.name = (info.name||"").toLowerCase();
            tr.dataset.role = m.role || "4"; tr.dataset.gold = gold;
            tr.dataset.online = (m.last_online||"").replace(" ","T"); tr.dataset.point = point;
            
            tr.innerHTML = `
                <td class="col-id">#${m.id_game_character}</td>
                <td class="col-img"><img class="avatar" src="${DOMAIN}/assets/tmp/avatar/${info.avatar || "1.png"}" onerror="this.src='${DOMAIN}/assets/tmp/avatar/1.png'"></td>
                <td class="col-name">${info.name || "N/A"}</td>
                <td class="col-role"><span class="badge badge-${m.role || 4}">${roleMap[m.role] || "Thành viên"}</span></td>
                <td class="col-gold ${gold > 0 ? 'green' : 'red'}">${gold > 0 ? gold.toLocaleString() : 'Chưa cống'}</td>
                <td class="col-online">${m.last_online || "--"}</td>
                <td class="col-tmc" style="color:${getTMCColor(point)}">${point}</td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById("total-members").innerText = members.length;
        document.getElementById("donated-count").innerText = donated;
        document.getElementById("total-gold").innerText = totalG.toLocaleString();
        document.getElementById("percent").innerText = ((donated / members.length) * 100).toFixed(1) + "%";
        
        initSort(); sortTable(currentSort.column, false);
    } catch (e) { console.error(e); }
}

function filterData() {
    const val = document.getElementById("search-box").value.toLowerCase();
    const rows = document.querySelectorAll("#guild-table tr");
    rows.forEach(r => { r.style.display = r.innerText.toLowerCase().includes(val) ? "" : "none"; });
}

function initSort() {
    document.querySelectorAll("th[data-sort]").forEach(th => {
        if(th._ok) return;
        th.addEventListener("click", () => sortTable(th.dataset.sort, true));
        th._ok = true;
    });
}

function sortTable(col, toggle) {
    const tbody = document.getElementById("guild-table"), rows = Array.from(tbody.querySelectorAll("tr"));
    if(toggle) { 
        if(currentSort.column === col) currentSort.asc = !currentSort.asc; 
        else { currentSort.column = col; currentSort.asc = true; } 
    }
    rows.sort((a,b) => {
        let aV = a.dataset[col], bV = b.dataset[col];
        const an = parseNum(aV), bn = parseNum(bV);
        if(an !== null && bn !== null) return (an - bn) * (currentSort.asc ? 1 : -1);
        return aV.localeCompare(bV, "vi") * (currentSort.asc ? 1 : -1);
    });
    rows.forEach(r => tbody.appendChild(r));
    document.querySelectorAll("th[data-sort]").forEach(th => {
        th.classList.remove("sorted-asc", "sorted-desc");
        if(th.dataset.sort === currentSort.column) th.classList.add(currentSort.asc ? "sorted-asc" : "sorted-desc");
    });
}

// Chỉ chạy một lần khi load trang
loadData();
</script>
</body>
</html>
