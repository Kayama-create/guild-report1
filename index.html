<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huyết Ma Tông - Dashboard</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #020617; --card: rgba(15, 23, 42, 0.9); --header: #1e293b;
            --text-main: #f8fafc; --text-sub: #94a3b8; --border: rgba(56, 189, 248, 0.15);
            --accent: #38bdf8; --success: #10b981; --danger: #f43f5e; --warning: #fbbf24;
        }
        [data-theme="light"] {
            --bg: #f1f5f9; --card: #ffffff; --header: #f8fafc;
            --text-main: #1e293b; --text-sub: #64748b; --border: #e2e8f0;
            --accent: #4f46e5;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg);
            color: var(--text-main); margin: 0; padding: 15px 10px; min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; position: relative; }

        .theme-toggle {
            position: absolute; top: 0; right: 0; width: 44px; height: 44px; border-radius: 12px;
            background: var(--card); border: 1px solid var(--border); cursor: pointer;
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }

        header { text-align: center; margin-bottom: 25px; }
        h1 { font-size: 2.2rem; font-weight: 800; margin: 0; background: linear-gradient(180deg, #fff 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .rank-bar {
            display: inline-flex; align-items: center; gap: 20px; margin-top: 15px;
            padding: 10px 25px; border-radius: 50px; background: var(--card);
            border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .rank-item { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 1rem; }
        .rank-val { color: var(--warning); text-shadow: 0 0 10px rgba(251, 191, 36, 0.4); }
        .score-val { color: var(--accent); }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 25px 0; }
        @media (min-width: 768px) { .stats-grid { grid-template-columns: repeat(6, 1fr); } }

        .stat-card {
            background: var(--card); padding: 15px 10px; border-radius: 20px;
            border: 1px solid var(--border); text-align: center;
        }
        .stat-card .label { font-size: 0.65rem; color: var(--text-sub); text-transform: uppercase; font-weight: 700; margin-bottom: 5px; display: block; }
        .stat-card .val { font-size: 1.2rem; font-weight: 800; color: #fff; }

        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box { flex: 1; }
        .search-box input {
            width: 100%; height: 50px; background: var(--card); border: 1px solid var(--border);
            padding: 0 20px; border-radius: 15px; color: var(--text-main); outline: none;
        }
        .btn-refresh {
            width: 50px; height: 50px; background: var(--card); border: 1px solid var(--border);
            border-radius: 15px; color: var(--accent); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
        }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }

        .table-wrapper {
            background: var(--card); border-radius: 24px; border: 1px solid var(--border);
            overflow-x: auto; -webkit-overflow-scrolling: touch;
        }
        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 900px; table-layout: fixed; }
        th, td { padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; font-size: 0.9rem; }
        th { background: var(--header); color: var(--text-sub); font-size: 0.75rem; text-transform: uppercase; font-weight: 800; position: sticky; top: 0; z-index: 10; cursor: pointer; }
        
        .sticky-col { position: sticky; left: 0; z-index: 5; background: var(--card) !important; border-right: 1px solid var(--border); }
        th.sticky-col { z-index: 11; background: var(--header) !important; }

        .w-id { width: 80px; opacity: 0.4; } .w-img { width: 70px; }
        .w-name { width: 180px; text-align: left !important; color: #fff; font-weight: 700; }
        .w-role { width: 140px; } .w-gold { width: 120px; font-weight: 700; } .w-time { width: 180px; color: var(--text-sub); font-size: 0.8rem; } .w-tmc { width: 100px; font-weight: 800; }

        .avatar { width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border); object-fit: cover; }
        .badge { font-size: 0.7rem; padding: 5px 12px; border-radius: 10px; font-weight: 800; min-width: 95px; display: inline-block; }
        .badge-1 { background: rgba(244, 63, 94, 0.2); color: #fb7185; }
        .badge-2 { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        .badge-3 { background: rgba(168, 85, 247, 0.2); color: #c084fc; }
        .badge-4 { background: rgba(255,255,255,0.05); color: var(--text-sub); }

        th.sorted-asc::after { content: " ▴"; color: var(--accent); }
        th.sorted-desc::after { content: " ▾"; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">🌙</span></button>
    
    <header>
        <h1 id="guild-name">HUYẾT MA TÔNG</h1>
        <div class="rank-bar">
            <div class="rank-item">🏆 HẠNG: <span id="guild-rank" class="rank-val">--</span></div>
            <div style="opacity: 0.2">|</div>
            <div class="rank-item">💎 ĐIỂM TÔNG CHIẾN: <span id="guild-score" class="score-val">--</span></div>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><span class="label">Đệ Tử</span><span id="total-members" class="val">0</span></div>
        <div class="stat-card"><span class="label">Góp Vàng</span><span id="donated-count" class="val" style="color:var(--success)">0</span></div>
        <div class="stat-card"><span class="label">Tổng Vàng</span><span id="total-gold" class="val">0</span></div>
        <div class="stat-card"><span class="label">Tiến Độ</span><span id="percent" class="val" style="color:var(--accent)">0%</span></div>
        <div class="stat-card"><span class="label">Ngày Boss</span><span id="boss-last-date" class="val" style="color:var(--warning); font-size:1rem">--</span></div>
        <div class="stat-card"><span class="label">Diệt Boss</span><span id="boss-hit-count" class="val">0</span></div>
    </div>

    <div class="controls">
        <div class="search-box"><input type="text" id="search" placeholder="Tìm tên đệ tử..." onkeyup="filter()"></div>
        <button class="btn-refresh" onclick="loadAll()" id="refresh-btn">↻</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th class="w-id" onclick="sortTable('id')">ID</th>
                    <th class="w-img">ẢNH</th>
                    <th class="w-name sticky-col" onclick="sortTable('name')">TÊN ĐỆ TỬ</th>
                    <th class="w-role" onclick="sortTable('role')">CHỨC VỤ</th>
                    <th class="w-gold" onclick="sortTable('gold')">VÀNG</th>
                    <th class="w-time" onclick="sortTable('online')">ONLINE</th>
                    <th class="w-tmc" onclick="sortTable('point')">TMC</th>
                </tr>
            </thead>
            <tbody id="main-table"></tbody>
        </table>
    </div>
</div>

<script>
const DOMAIN = "https://cmangax14.com", guild_id = 22;
const roleMap = {1:"Tông chủ", 2:"Phó Tông chủ", 3:"Trưởng lão", 4:"Thành viên"};
let currentSort = { column: 'point', asc: false };
let rawMembers = [];

function toggleTheme() {
    const h = document.documentElement;
    const t = h.getAttribute("data-theme") === "dark" ? "light" : "dark";
    h.setAttribute("data-theme", t);
    document.getElementById("theme-icon").innerText = t === "light" ? "☀️" : "🌙";
}

const safeParse = v => { try { return JSON.parse(v); } catch { return v || {}; }};

// HÀM QUAN TRỌNG: Màu sắc TMC đa cấp
function getTMCColor(p) {
    if (!p || p <= 0) return "var(--text-sub)";
    if (p >= 300) return "#f43f5e"; // Đỏ rực
    if (p >= 200) return "#fbbf24"; // Vàng nắng
    if (p >= 80) return "#10b981";  // Xanh lục
    return "#38bdf8"; // Xanh dương
}

async function loadAll() {
    const btn = document.getElementById("refresh-btn");
    btn.classList.add("spin");
    
    try {
        const [gRes, mRes, sRes, rRes] = await Promise.all([
            fetch(`${DOMAIN}/api/get_data_by_id?table=game_guild&data=data,donate&id=${guild_id}`).then(r => r.json()),
            fetch(`${DOMAIN}/api/game_guild_member?waiting=0&guild=${guild_id}`).then(r => r.json()),
            fetch(`${DOMAIN}/api/score_list?type=guild_battle_player&limit=500`).then(r => r.json()),
            fetch(`${DOMAIN}/api/score_list?type=guild_battle_guild&limit=100`).then(r => r.json())
        ]);

        const guild = safeParse(gRes.data.data), donateMap = safeParse(gRes.data.donate);
        const members = mRes.data || mRes;
        const scoreMap = {};
        (sRes.data || sRes).forEach(s => {
            const i = safeParse(s.info);
            if(i.id) scoreMap[String(i.id)] = s.score;
        });

        // Xử lý Rank Tông Môn
        const rankList = rRes.data || rRes;
        const myRankIdx = rankList.findIndex(x => {
            const info = safeParse(x.info);
            return String(info.id || x.target) === String(guild_id);
        });

        if(myRankIdx !== -1) {
            document.getElementById("guild-rank").innerText = myRankIdx + 1;
            document.getElementById("guild-score").innerText = (Number(rankList[myRankIdx].score) || 0).toLocaleString();
        }

        document.getElementById("guild-name").innerText = guild.name || "HUYẾT MA TÔNG";
        document.getElementById("boss-last-date").innerText = guild.boss?.day || "N/A";
        document.getElementById("boss-hit-count").innerText = guild.boss?.amount || 0;

        let donated = 0, totalG = 0;
        rawMembers = members.map(m => {
            const info = safeParse(m.info);
            const gold = Number(donateMap[String(m.id_game_character)]) || 0;
            const point = scoreMap[String(m.id_game_character)] || 0;
            if(gold > 0) { donated++; totalG += gold; }
            return { ...m, name: info.name || "N/A", avatar: info.avatar || "1.png", gold, point };
        });

        document.getElementById("total-members").innerText = rawMembers.length;
        document.getElementById("donated-count").innerText = donated;
        document.getElementById("total-gold").innerText = totalG.toLocaleString();
        document.getElementById("percent").innerText = ((donated/rawMembers.length)*100).toFixed(1) + "%";

        renderTable();

    } catch (e) { console.error(e); }
    finally { setTimeout(() => btn.classList.remove("spin"), 800); }
}

function renderTable() {
    const tbody = document.getElementById("main-table");
    tbody.innerHTML = "";

    // Sort logic
    const sorted = [...rawMembers].sort((a, b) => {
        let v1 = a[currentSort.column], v2 = b[currentSort.column];
        if (typeof v1 === 'string') return v1.localeCompare(v2, 'vi') * (currentSort.asc ? 1 : -1);
        return (v1 - v2) * (currentSort.asc ? 1 : -1);
    });

    sorted.forEach(m => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td class="w-id">#${m.id_game_character}</td>
            <td><img class="avatar" src="${DOMAIN}/assets/tmp/avatar/${m.avatar}"></td>
            <td class="w-name sticky-col">${m.name}</td>
            <td><span class="badge badge-${m.role}">${roleMap[m.role]}</span></td>
            <td style="color:${m.gold > 0 ? 'var(--success)' : 'var(--danger)'}">${m.gold > 0 ? m.gold.toLocaleString() : 'Chưa cống'}</td>
            <td class="w-time">${m.last_online}</td>
            <td class="w-tmc" style="color:${getTMCColor(m.point)}">${m.point}</td>
        `;
        tbody.appendChild(tr);
    });

    // Update sort icons
    document.querySelectorAll("th").forEach(th => {
        th.className = th.className.replace(/sorted-(asc|desc)/, "");
        if (th.getAttribute("onclick")?.includes(`'${currentSort.column}'`)) {
            th.classList.add(currentSort.asc ? "sorted-asc" : "sorted-desc");
        }
    });
}

function sortTable(col) {
    if (currentSort.column === col) currentSort.asc = !currentSort.asc;
    else { currentSort.column = col; currentSort.asc = true; }
    renderTable();
}

function filter() {
    const val = document.getElementById("search").value.toLowerCase();
    document.querySelectorAll("#main-table tr").forEach(r => {
        r.style.display = r.innerText.toLowerCase().includes(val) ? "" : "none";
    });
}

loadAll();
</script>
</body>
</html>
